<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="container p-5 my-5 border">
    <header class="row">
        <div class="col-md-10">
            <h1>Library</h1>
        </div>
        <div class="col-md-2 text-end">
            <button type="button" class="btn btn-light" data-bs-toggle="modal" data-bs-target="#bookForm">New book</button>
        </div>
    </header>
    <div class="modal fade row" id="bookForm">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h4 class="modal-title">New book</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" id="newBookFormClose"></button>
                </div>

                <div class="modal-body">
                    <form id="newBookForm">
                        <div class="mb-3 mt-3">
                            <label for="title" class="form-label">Title:</label>
                            <input type="text" class="form-control" id="title" placeholder="Enter title" name="title" required>
                        </div>
                        <div class="mb-3">
                            <label for="author" class="form-label">Author:</label>
                            <input type="text" class="form-control" id="author" placeholder="Enter author name" name="author" required>
                        </div>
                        <div class="mb-3">
                            <label for="numberOfPages" class="form-label">Number of pages:</label>
                            <input type="number" class="form-control" id="numberOfPages" placeholder="Enter number of pages" name="numberOfPages" required>
                        </div>
                        <div class="form-check mb-3">
                            <label class="form-check-label">
                                <input class="form-check-input" type="checkbox" name="read" id="read"> Read
                            </label>
                        </div>
                        <button type="submit" class="btn btn-outline-primary" id="newBookSubmit">Submit</button>
                    </form>

                </div>
            </div>
        </div>
    </div>
    <main id="library" class="row">

    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
